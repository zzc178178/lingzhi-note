# Netlify 配置文件 - 配置 serverless functions
[build]
  base = "ai-note-h5"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Functions 目录必须相对于 base 目录
[functions]
  directory = "./netlify-functions"

[[redirects]]
  from = "/api/fetch"
  to = "/.netlify/functions/fetch"
  status = 200